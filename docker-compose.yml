services:
  app:
    build: .
    container_name: ra-backend-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/data/db.sqlite3
      UPLOAD_DIR: /app/data/uploads
      CHROMA_PERSIST_DIR: /app/data/chroma_data
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:8000:8000"

  caddy:
    image: caddy:2-alpine
    container_name: ra-backend-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
